<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Smart TV Receiver</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9; /* 밝은 배경 */
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #1e293b; padding: 15px;
        }

        /* 📺 밝고 깔끔한 스마트 TV 본체 */
        .tv-device {
            width: 100%; max-width: 550px;
            background: #ffffff;
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
            padding: 25px; 
            border: 1px solid #e2e8f0;
        }

        .brand-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 0 5px;
        }
        .brand-name {
            font-size: 1.1rem; font-weight: 800; color: #0f172a;
            letter-spacing: -0.5px;
        }
        
        .on-air-light {
            font-size: 0.75rem; font-weight: bold; letter-spacing: 1px;
            color: #94a3b8; background: #f1f5f9; padding: 5px 12px; border-radius: 20px;
            transition: 0.3s;
        }
        .on-air-light.active {
            color: #fff; background: #ef4444;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        /* 📺 비디오 모니터 영역 */
        .monitor-panel {
            background: #000;
            border-radius: 12px;
            margin-bottom: 20px; 
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9; /* 16:9 비율 유지 */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        video {
            width: 100%; height: 100%;
            background: #000;
            object-fit: contain;
        }

        /* 신호 없음 화면 */
        .no-signal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #1e293b;
            color: #fff; z-index: 10; text-align: center;
        }
        .no-signal h2 { font-size: 1.3rem; margin-bottom: 5px; color: #f8fafc; }
        .no-signal p { font-size: 0.85rem; color: #94a3b8; line-height: 1.4; padding: 0 20px; }

        /* 현재 채널 상태창 */
        .status-bar {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
            padding: 15px; margin-bottom: 20px; text-align: center;
        }
        #led-station { font-size: 1.1rem; font-weight: 700; color: #3b82f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        /* 조작 버튼 영역 */
        .controls { display: grid; grid-template-columns: 1fr 100px; gap: 10px; margin-bottom: 20px; }
        
        select {
            appearance: none; background: #fff; color: #1e293b;
            border: 2px solid #e2e8f0; padding: 14px 15px; border-radius: 12px;
            font-size: 0.95rem; cursor: pointer; outline: none; font-weight: 600;
            transition: 0.2s;
        }
        select:focus { border-color: #3b82f6; }

        .scan-btn {
            background: #3b82f6;
            color: #fff; border: none; border-radius: 12px; 
            font-size: 0.95rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: 0.2s;
        }
        .scan-btn:active { transform: scale(0.96); }

        /* 채널 리스트 창 */
        .list-window {
            background: #fff; border-radius: 12px; height: 220px;
            overflow-y: auto; border: 1px solid #e2e8f0;
        }
        .station-item {
            padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid transparent; transition: 0.2s;
        }
        .station-item:hover { background-color: #f8fafc; border-left-color: #3b82f6; }
        .st-name { color: #0f172a; font-size: 0.95rem; font-weight: 700; }
        .st-meta { color: #64748b; font-size: 0.75rem; background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-weight: 600;}

        .list-window::-webkit-scrollbar { width: 6px; }
        .list-window::-webkit-scrollbar-track { background: transparent; }
        .list-window::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .no-data { padding: 40px 20px; text-align: center; color: #94a3b8; font-size: 0.9rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="tv-device">
    <div class="brand-header">
        <div class="brand-name">Global TV Smart Viewer</div>
        <div id="on-air-indicator" class="on-air-light">LIVE</div>
    </div>

    <div class="monitor-panel">
        <div id="no-signal" class="no-signal">
            <h2>대기 중</h2>
            <p>아래에서 지역을 선택하고 채널을 클릭하세요.<br>(방송국 사정에 따라 간혹 끊길 수 있습니다)</p>
        </div>
        <video id="tv-player" controls autoplay playsinline></video>
    </div>

    <div class="status-bar">
        <div id="led-station">채널을 선택해주세요</div>
    </div>

    <div class="controls">
        <select id="region-select">
            <option value="">-- 지역 선택 (Region) --</option>
            <option value="Asia">🌏 아시아 (Asia) & 오세아니아</option>
            <option value="Europe">🇪🇺 유럽 (Europe)</option>
            <option value="Russia">🇷🇺 러시아 (Russia) & CIS</option>
            <option value="NorthAmerica">🇺🇸 북미 (North America)</option>
            <option value="SouthAmerica">🌎 남미 (South America)</option>
            <option value="Africa">🌍 중동 & 아프리카 (ME & Africa)</option>
        </select>
        <button id="scan-btn" class="scan-btn">불러오기</button>
    </div>

    <div class="list-window">
        <ul id="station-list">
            <li class="no-data">지역을 선택하고 버튼을 누르면<br>가장 안정적인 글로벌 채널이 나타납니다.</li>
        </ul>
    </div>
</div>

<script>
    // 💡 가장 생존율이 높은 글로벌 공영/뉴스 스트림 위주로 엄선한 데이터베이스
    const tvDatabase = {
        "Asia": [
            { name: "Arirang TV (Korea)", category: "News/Culture", url: "https://amdlive.ctnd.com.edgesuite.net/arirang_1ch/smil:arirang_1ch.smil/playlist.m3u8" },
            { name: "CGTN (China)", category: "News", url: "https://live.cgtn.com/1000/prog_index.m3u8" },
            { name: "CNA (Singapore)", category: "News", url: "https://d2e1asnsl7br7b.cloudfront.net/7782e205e72f43aeb4a48ec97f66ebbe/index.m3u8" },
            { name: "Al Jazeera (Qatar)", category: "News", url: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8" },
            { name: "Sky News Australia", category: "News", url: "https://skynewsau-live.akamaized.net/hls/live/2002689/skynewsau-extra1/master.m3u8" }
        ],
        "Europe": [
            { name: "DW English (Germany)", category: "News", url: "https://dwamdstream102.akamaized.net/hls/live/2015525/dwstream102/index.m3u8" },
            { name: "France 24 English", category: "News", url: "https://static.france24.com/live/F24_EN_HI_HLS/live_web.m3u8" },
            { name: "Sky News (UK)", category: "News", url: "https://skynews-eu.rakuten.wurl.tv/playlist.m3u8" },
            { name: "EuroNews (Europe)", category: "News", url: "https://ewns-hls-en-europe.akamaized.net/default/master.m3u8" }
        ],
        "Russia": [
            { name: "RT News (Global)", category: "News", url: "https://rt-glb.rttv.com/dvr/rtnews/playlist.m3u8" },
            { name: "RT Documentary", category: "Docu", url: "https://rt-rtd.secure.footprint.net/hls-live/rt-rtd/_definst_/live/playlist.m3u8" },
            { name: "Channel One Russia (1TV)", category: "General", url: "https://edge25-htc.1tv.ru/live-v2/1000/1tv/master.m3u8" }
        ],
        "NorthAmerica": [
            { name: "Bloomberg TV", category: "Business", url: "https://live.bloomberg.tv/cbn/x/8.m3u8" },
            { name: "CBS News Live", category: "News", url: "https://cbsn-us.cbsnstream.cbsnews.com/out/v1/55a8648e8f134e82a470f83d562deeca/master.m3u8" },
            { name: "NASA TV Public", category: "Science", url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8" },
            { name: "Red Bull TV", category: "Sports", url: "https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8" }
        ],
        "SouthAmerica": [
            { name: "TeleSUR (Latin America)", category: "News", url: "https://cdnamd-hls-globecast.akamaized.net/live/ramdisk/telesur/hls_sn_m/index.m3u8" },
            { name: "Record News (Brazil)", category: "News", url: "https://cdn.recordnews.tv.br/videostream/hls/playlist.m3u8" },
            { name: "Canal 26 (Argentina)", category: "News", url: "https://live.canal26.com/live/canal26/playlist.m3u8" }
        ],
        "Africa": [
            { name: "TRT World", category: "News", url: "https://trt-hls.rnp.trt.com.tr/tv/trtworld/master.m3u8" },
            { name: "Africanews", category: "News", url: "https://africanews.wurl.tv/playlist.m3u8" },
            { name: "KTV (Kenya)", category: "General", url: "https://tv.y2k.co.ke/hls/ktnnews.m3u8" }
        ]
    };

    const videoElement = document.getElementById('tv-player');
    const noSignalScreen = document.getElementById('no-signal');
    const ledStation = document.getElementById('led-station');
    const stationList = document.getElementById('station-list');
    const scanBtn = document.getElementById('scan-btn');
    const onAirIndicator = document.getElementById('on-air-indicator');
    
    let hls = null; 

    // 💡 지역 선택 시 채널 목록 스캔
    scanBtn.addEventListener('click', () => {
        const region = document.getElementById('region-select').value;
        
        if(!region) {
            alert("지역을 먼저 선택해 주십시오.");
            return;
        }

        const channels = tvDatabase[region];
        ledStation.innerText = `총 ${channels.length}개의 채널이 검색되었습니다.`;
        stationList.innerHTML = '';

        channels.forEach(channel => {
            const li = document.createElement('li');
            li.className = 'station-item';
            li.innerHTML = `
                <div class="st-name">${channel.name}</div>
                <div class="st-meta">${channel.category}</div>
            `;
            li.onclick = () => playChannel(channel.url, channel.name);
            stationList.appendChild(li);
        });
    });

    // 💡 TV 채널 재생 로직 (hls.js 활용)
    function playChannel(url, name) {
        ledStation.innerText = `▶ 시청 중: ${name}`;
        noSignalScreen.style.display = 'none'; 
        onAirIndicator.classList.add('active'); 
        
        if (hls) {
            hls.destroy();
        }

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(videoElement);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                videoElement.play();
            });
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) handleError();
            });
        }
        else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            videoElement.src = url;
            videoElement.addEventListener('loadedmetadata', function() {
                videoElement.play();
            });
            videoElement.addEventListener('error', handleError);
        }
    }

    // 재생 오류 발생 시 처리
    function handleError() {
        noSignalScreen.style.display = 'flex';
        noSignalScreen.innerHTML = '<h2>송출 오류 📡</h2><p>해당 방송국의 서버가 응답하지 않거나 주소가 변경되었습니다.<br>다른 채널을 선택해 주세요.</p>';
        ledStation.innerText = "연결 실패 (Connection Lost)";
        onAirIndicator.classList.remove('active');
    }
</script>

</body>
</html>
