<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Smart TV Receiver</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #1e293b; padding: 15px;
        }

        .tv-device {
            width: 100%; max-width: 550px;
            background: #ffffff;
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
            padding: 25px; 
            border: 1px solid #e2e8f0;
        }

        .brand-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 0 5px;
        }
        .brand-name {
            font-size: 1.1rem; font-weight: 800; color: #0f172a;
            letter-spacing: -0.5px;
        }
        
        .on-air-light {
            font-size: 0.75rem; font-weight: bold; letter-spacing: 1px;
            color: #94a3b8; background: #f1f5f9; padding: 5px 12px; border-radius: 20px;
            transition: 0.3s;
        }
        .on-air-light.active {
            color: #fff; background: #ef4444;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .monitor-panel {
            background: #000;
            border-radius: 12px;
            margin-bottom: 20px; 
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        video {
            width: 100%; height: 100%;
            background: #000;
            object-fit: contain;
            display: none; 
        }

        .launcher-screen, .no-signal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #1e293b;
            color: #fff; z-index: 10; text-align: center;
        }
        
        .launcher-screen { display: none; background: #0f172a; }
        .launcher-screen h2 { font-size: 1.2rem; margin-bottom: 10px; color: #f8fafc; }
        .launcher-screen p { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; padding: 0 20px; margin-bottom: 20px; }
        
        .launch-btn {
            background: #ef4444; color: #fff; text-decoration: none;
            padding: 10px 24px; border-radius: 8px; font-weight: bold; font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4); transition: 0.2s;
        }
        .launch-btn:active { transform: scale(0.95); }

        .no-signal h2 { font-size: 1.3rem; margin-bottom: 5px; color: #f8fafc; }
        .no-signal p { font-size: 0.85rem; color: #94a3b8; line-height: 1.4; padding: 0 20px; }

        .status-bar {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
            padding: 15px; margin-bottom: 20px; text-align: center;
        }
        #led-station { font-size: 1.1rem; font-weight: 700; color: #3b82f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        .controls { display: grid; grid-template-columns: 1fr 100px; gap: 10px; margin-bottom: 20px; }
        
        select {
            appearance: none; background: #fff; color: #1e293b;
            border: 2px solid #e2e8f0; padding: 14px 15px; border-radius: 12px;
            font-size: 0.95rem; cursor: pointer; outline: none; font-weight: 600;
        }

        .scan-btn {
            background: #3b82f6; color: #fff; border: none; border-radius: 12px; 
            font-size: 0.95rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .list-window {
            background: #fff; border-radius: 12px; height: 220px;
            overflow-y: auto; border: 1px solid #e2e8f0;
        }
        .station-item {
            padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid transparent;
        }
        .station-item:hover { background-color: #f8fafc; border-left-color: #3b82f6; }
        .st-name { color: #0f172a; font-size: 0.95rem; font-weight: 700; }
        .st-meta { color: #64748b; font-size: 0.75rem; background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-weight: 600;}
    </style>
</head>
<body>

<div class="tv-device">
    <div class="brand-header">
        <div class="brand-name">Global TV Smart Viewer</div>
        <div id="on-air-indicator" class="on-air-light">LIVE</div>
    </div>

    <div class="monitor-panel">
        <div id="no-signal" class="no-signal">
            <h2>대기 중</h2>
            <p>아래에서 지역을 선택하고 채널을 클릭하세요.</p>
        </div>
        
        <video id="tv-player" controls playsinline></video>

        <div id="launcher-screen" class="launcher-screen">
            <h2>보안 채널 접속</h2>
            <p>해당 방송사는 외부 앱에서의 직접 재생을 차단하고 있습니다.<br>아래 버튼을 누르면 공식 유튜브 채널로 연결됩니다.</p>
            <a id="launch-btn" class="launch-btn" href="#" target="_blank">유튜브 앱으로 열기</a>
        </div>
    </div>

    <div class="status-bar">
        <div id="led-station">채널을 선택해주세요</div>
    </div>

    <div class="controls">
        <select id="region-select">
            <option value="">-- 대륙/지역 선택 --</option>
            <option value="Korea">🇰🇷 대한민국 (YouTube 연동)</option>
            <option value="Asia">🌏 아시아 & 오세아니아</option>
            <option value="MiddleEast">🕌 중동 (Middle East)</option>
            <option value="Europe">🇪🇺 유럽 (Europe)</option>
            <option value="RussiaCIS">🇷🇺 러시아 & CIS (중앙아시아)</option>
            <option value="NorthAmerica">🇺🇸 북미 (North America)</option>
            <option value="SouthAmerica">🌎 중남미 (Latin America)</option>
            <option value="Africa">🌍 아프리카 (Africa)</option>
        </select>
        <button id="scan-btn" class="scan-btn">불러오기</button>
    </div>

    <div class="list-window">
        <ul id="station-list">
            <li class="no-data" style="padding:40px 20px; text-align:center; color:#94a3b8;">전 세계 방송을 탐험해 보세요.<br>지역을 선택하고 버튼을 누르시면 됩니다.</li>
        </ul>
    </div>
</div>

<script>
    // 💡 전 세계 문화권 대규모 확장 데이터베이스 (약 40여 개국 반영)
    const tvDatabase = {
        "Korea": [
            { name: "MBC News (24시 라이브)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@MBCNEWS11/live" },
            { name: "KBS News (24시 라이브)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@KBSnews/live" },
            { name: "SBS News (24시 라이브)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@sbsnews8/live" },
            { name: "JTBC News (24시 라이브)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@jtbc_news/live" },
            { name: "YTN (24시간 뉴스)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@ytnnews24/live" },
            { name: "연합뉴스TV", category: "News", type: "youtube_external", url: "https://www.youtube.com/@yonhapnewstv23/live" },
            { name: "Arirang TV (Global)", category: "Culture", type: "hls", url: "https://amdlive-ch01-ctnd-com.akamaized.net/arirang_1ch/smil:arirang_1ch.smil/playlist.m3u8" }
        ],
        "Asia": [
            { name: "NHK World (일본)", category: "News/Culture", type: "hls", url: "https://b-nhkwlive-ojp.akamaized.net/hls/live/2003459/nhkwlive-ojp-en/index.m3u8" },
            { name: "CGTN (중국)", category: "News", type: "hls", url: "https://live.cgtn.com/1000/prog_index.m3u8" },
            { name: "CNA (싱가포르)", category: "News", type: "hls", url: "https://d2e1asnsl7br7b.cloudfront.net/7782e205e72f43aeb4a48ec97f66ebbe/index.m3u8" },
            { name: "NDTV 24x7 (인도)", category: "News", type: "hls", url: "https://ndtv24x7elemarchana.akamaized.net/hls/live/2003678/ndtv24x7/master.m3u8" },
            { name: "Thai PBS (태국)", category: "General", type: "hls", url: "https://live.thaipbs.or.th/live/thaipbs/master.m3u8" },
            { name: "Sky News Australia (호주)", category: "News", type: "hls", url: "https://skynewsau-live.akamaized.net/hls/live/2002689/skynewsau-extra1/master.m3u8" },
            { name: "ABC News (호주)", category: "News", type: "hls", url: "https://abc-iview-mediapackagelinux-2.akamaized.net/out/v1/6e1cc6d25ea0496ea9d9e6eb1a3964bb/index.m3u8" }
        ],
        "MiddleEast": [
            { name: "Al Jazeera English (카타르)", category: "News", type: "hls", url: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8" },
            { name: "TRT World (튀르키예)", category: "News/Culture", type: "hls", url: "https://trt-hls.rnp.trt.com.tr/tv/trtworld/master.m3u8" },
            { name: "Al Arabiya (사우디/UAE)", category: "News", type: "hls", url: "https://live.alarabiya.net/alarabiya-pub/alarabiya/playlist.m3u8" },
            { name: "i24NEWS English (이스라엘)", category: "News", type: "hls", url: "https://bcovlive-a.akamaihd.net/148719f95d124ecdb5dd0355f3cb9cc6/eu-central-1/5377161680001/playlist.m3u8" }
        ],
        "Europe": [
            { name: "DW English (독일)", category: "News/Culture", type: "hls", url: "https://dwamdstream102.akamaized.net/hls/live/2015525/dwstream102/index.m3u8" },
            { name: "France 24 English (프랑스)", category: "News", type: "hls", url: "https://static.france24.com/live/F24_EN_HI_HLS/live_web.m3u8" },
            { name: "Sky News (영국)", category: "News", type: "hls", url: "https://skynews-eu.rakuten.wurl.tv/playlist.m3u8" },
            { name: "EuroNews (유럽연합)", category: "News", type: "hls", url: "https://ewns-hls-en-europe.akamaized.net/default/master.m3u8" },
            { name: "Rai News 24 (이탈리아)", category: "News", type: "hls", url: "https://rainews1-live.akamaized.net/hls/live/598326/rainews1/rainews1/playlist.m3u8" },
            { name: "RTVE 24h (스페인)", category: "News", type: "hls", url: "https://rtve-live-tve24h.akamaized.net/rtve/tve24h/main.m3u8" },
            { name: "TVP World (폴란드)", category: "News", type: "hls", url: "https://tvp-video-live.redcdn.pl/dash/O_TVP_WORLD_1234/manifest.m3u8" }
        ],
        "RussiaCIS": [
            { name: "RT News (러시아 글로벌)", category: "News", type: "hls", url: "https://rt-glb.rttv.com/dvr/rtnews/playlist.m3u8" },
            { name: "Channel One 1TV (러시아)", category: "General", type: "hls", url: "https://edge25-htc.1tv.ru/live-v2/1000/1tv/master.m3u8" },
            { name: "Espreso TV (우크라이나)", category: "News", type: "hls", url: "https://espreso-tv-live.akamaized.net/hls/live/2105151/espreso/master.m3u8" },
            { name: "Belarus 24 (벨라루스)", category: "Culture", type: "hls", url: "https://live.belarus24.by/b24/b24.m3u8" }
        ],
        "NorthAmerica": [
            { name: "Bloomberg TV (미국 경제)", category: "Business", type: "hls", url: "https://liveprodeuwest.akamaized.net/eu1/Channel-EUTVqvs-AWS-ireland-1/Source-EUTVqvs-1000-1_live.m3u8" },
            { name: "CBS News Live (미국)", category: "News", type: "hls", url: "https://cbsn-us.cbsnstream.cbsnews.com/out/v1/55a8648e8f134e82a470f83d562deeca/master.m3u8" },
            { name: "NASA TV Public (우주/과학)", category: "Science", type: "hls", url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8" },
            { name: "Red Bull TV (익스트림 스포츠)", category: "Sports", type: "hls", url: "https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8" },
            { name: "Milenio TV (멕시코)", category: "News", type: "hls", url: "https://mdstrm.com/live-stream-playlist/57d071a942bd7f286b5b5c90.m3u8" }
        ],
        "SouthAmerica": [
            { name: "TeleSUR (중남미 연합)", category: "News/Culture", type: "hls", url: "https://cdnamd-hls-globecast.akamaized.net/live/ramdisk/telesur/hls_sn_m/index.m3u8" },
            { name: "Record News (브라질)", category: "News", type: "hls", url: "https://cdn.recordnews.tv.br/videostream/hls/playlist.m3u8" },
            { name: "Canal 26 (아르헨티나)", category: "News", type: "hls", url: "https://live.canal26.com/live/canal26/playlist.m3u8" },
            { name: "Caracol TV (콜롬비아)", category: "General", type: "youtube_external", url: "https://www.youtube.com/@caracoltv/live" }
        ],
        "Africa": [
            { name: "Africanews (범아프리카)", category: "News", type: "hls", url: "https://africanews.wurl.tv/playlist.m3u8" },
            { name: "SABC News (남아프리카 공화국)", category: "News", type: "hls", url: "https://sabcnews.akamaized.net/hls/live/2018590/sabcnews/master.m3u8" },
            { name: "KTV (케냐)", category: "General", type: "hls", url: "https://tv.y2k.co.ke/hls/ktnnews.m3u8" },
            { name: "NTA (나이지리아 국영방송)", category: "General", type: "youtube_external", url: "https://www.youtube.com/@ntanewsnow/live" }
        ]
    };

    const videoElement = document.getElementById('tv-player');
    const noSignalScreen = document.getElementById('no-signal');
    const launcherScreen = document.getElementById('launcher-screen');
    const launchBtn = document.getElementById('launch-btn');
    const ledStation = document.getElementById('led-station');
    const stationList = document.getElementById('station-list');
    const scanBtn = document.getElementById('scan-btn');
    const onAirIndicator = document.getElementById('on-air-indicator');
    
    let hls = null; 

    scanBtn.addEventListener('click', () => {
        const region = document.getElementById('region-select').value;
        if(!region) { alert("지역을 선택해 주십시오."); return; }

        const channels = tvDatabase[region];
        ledStation.innerText = `총 ${channels.length}개의 채널이 검색되었습니다.`;
        stationList.innerHTML = '';

        channels.forEach(channel => {
            const li = document.createElement('li');
            li.className = 'station-item';
            li.innerHTML = `
                <div class="st-name">${channel.name}</div>
                <div class="st-meta">${channel.category}</div>
            `;
            li.onclick = () => playChannel(channel);
            stationList.appendChild(li);
        });
    });

    function playChannel(channel) {
        ledStation.innerText = `▶ 선택됨: ${channel.name}`;
        onAirIndicator.classList.add('active'); 
        
        noSignalScreen.style.display = 'none'; 
        videoElement.style.display = 'none';
        launcherScreen.style.display = 'none';
        
        if (hls) hls.destroy();
        videoElement.pause();

        if (channel.type === "youtube_external") {
            launcherScreen.style.display = 'flex';
            launchBtn.href = channel.url;
            return;
        }

        videoElement.style.display = 'block';

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(channel.url);
            hls.attachMedia(videoElement);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                videoElement.play();
            });
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) handleError();
            });
        } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            videoElement.src = channel.url;
            videoElement.addEventListener('loadedmetadata', function() {
                videoElement.play();
            });
            videoElement.addEventListener('error', handleError);
        }
    }

    function handleError() {
        videoElement.style.display = 'none';
        noSignalScreen.style.display = 'flex';
        noSignalScreen.innerHTML = `<h2>송출 오류 📡</h2><p>해당 국가의 채널 주소가 일시적으로 차단되었습니다.<br>다른 채널을 선택해 보세요.</p>`;
        ledStation.innerText = "연결 실패 (Offline)";
        onAirIndicator.classList.remove('active');
    }
</script>

</body>
</html>
