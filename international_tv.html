<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Smart TV Receiver</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #1e293b; padding: 15px;
        }

        .tv-device {
            width: 100%; max-width: 550px;
            background: #ffffff;
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
            padding: 25px; 
            border: 1px solid #e2e8f0;
        }

        .brand-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 0 5px;
        }
        .brand-name {
            font-size: 1.1rem; font-weight: 800; color: #0f172a;
            letter-spacing: -0.5px;
        }
        
        .on-air-light {
            font-size: 0.75rem; font-weight: bold; letter-spacing: 1px;
            color: #94a3b8; background: #f1f5f9; padding: 5px 12px; border-radius: 20px;
            transition: 0.3s;
        }
        .on-air-light.active {
            color: #fff; background: #ef4444;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        /* 모니터 패널 */
        .monitor-panel {
            background: #000;
            border-radius: 12px;
            margin-bottom: 20px; 
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        video {
            width: 100%; height: 100%;
            background: #000;
            object-fit: contain;
            display: none; /* 기본 숨김 */
        }

        /* 💡 외부 앱 연동 안내 화면 (새로 추가) */
        .launcher-screen, .no-signal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #1e293b;
            color: #fff; z-index: 10; text-align: center;
        }
        
        .launcher-screen { display: none; background: #0f172a; }
        .launcher-screen h2 { font-size: 1.2rem; margin-bottom: 10px; color: #f8fafc; }
        .launcher-screen p { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; padding: 0 20px; margin-bottom: 20px; }
        
        .launch-btn {
            background: #ef4444; color: #fff; text-decoration: none;
            padding: 10px 24px; border-radius: 8px; font-weight: bold; font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4); transition: 0.2s;
        }
        .launch-btn:active { transform: scale(0.95); }

        .no-signal h2 { font-size: 1.3rem; margin-bottom: 5px; color: #f8fafc; }
        .no-signal p { font-size: 0.85rem; color: #94a3b8; line-height: 1.4; padding: 0 20px; }

        .status-bar {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
            padding: 15px; margin-bottom: 20px; text-align: center;
        }
        #led-station { font-size: 1.1rem; font-weight: 700; color: #3b82f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        .controls { display: grid; grid-template-columns: 1fr 100px; gap: 10px; margin-bottom: 20px; }
        
        select {
            appearance: none; background: #fff; color: #1e293b;
            border: 2px solid #e2e8f0; padding: 14px 15px; border-radius: 12px;
            font-size: 0.95rem; cursor: pointer; outline: none; font-weight: 600;
        }

        .scan-btn {
            background: #3b82f6; color: #fff; border: none; border-radius: 12px; 
            font-size: 0.95rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .list-window {
            background: #fff; border-radius: 12px; height: 220px;
            overflow-y: auto; border: 1px solid #e2e8f0;
        }
        .station-item {
            padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid transparent;
        }
        .station-item:hover { background-color: #f8fafc; border-left-color: #3b82f6; }
        .st-name { color: #0f172a; font-size: 0.95rem; font-weight: 700; }
        .st-meta { color: #64748b; font-size: 0.75rem; background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-weight: 600;}
    </style>
</head>
<body>

<div class="tv-device">
    <div class="brand-header">
        <div class="brand-name">Global TV Smart Viewer</div>
        <div id="on-air-indicator" class="on-air-light">LIVE</div>
    </div>

    <div class="monitor-panel">
        <!-- 기본 대기 화면 -->
        <div id="no-signal" class="no-signal">
            <h2>대기 중</h2>
            <p>아래에서 지역을 선택하고 채널을 클릭하세요.</p>
        </div>
        
        <!-- 자체 재생 플레이어 -->
        <video id="tv-player" controls playsinline></video>

        <!-- 💡 외부 앱(유튜브) 연결 안내 화면 -->
        <div id="launcher-screen" class="launcher-screen">
            <h2>보안 채널 접속</h2>
            <p>해당 방송사는 외부 앱에서의 직접 재생을 차단하고 있습니다.<br>아래 버튼을 누르면 공식 유튜브 채널로 연결됩니다.</p>
            <a id="launch-btn" class="launch-btn" href="#" target="_blank">유튜브에서 라이브 보기</a>
        </div>
    </div>

    <div class="status-bar">
        <div id="led-station">채널을 선택해주세요</div>
    </div>

    <div class="controls">
        <select id="region-select">
            <option value="">-- 지역 선택 (Region) --</option>
            <option value="Korea">🇰🇷 대한민국 (YouTube 연동)</option>
            <option value="Asia">🌏 아시아 (Asia) & 중동</option>
            <option value="Europe">🇪🇺 유럽 (Europe)</option>
        </select>
        <button id="scan-btn" class="scan-btn">불러오기</button>
    </div>

    <div class="list-window">
        <ul id="station-list">
            <li class="no-data" style="padding:40px 20px; text-align:center; color:#94a3b8;">지역을 선택하고 버튼을 누르면<br>채널이 나타납니다.</li>
        </ul>
    </div>
</div>

<script>
    // 💡 type 속성 추가: 'hls'(자체 재생) vs 'youtube_external'(유튜브 앱으로 띄우기)
    const tvDatabase = {
        "Korea": [
            // 방송사 공식 라이브 주소 (스마트폰에서 클릭 시 유튜브 앱으로 바로 전환됨)
            { name: "MBC News (24시 라이브)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@MBCNEWS11/live" },
            { name: "KBS News (24시 라이브)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@KBSnews/live" },
            { name: "SBS News (24시 라이브)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@sbsnews8/live" },
            { name: "JTBC News (24시 라이브)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@jtbc_news/live" },
            { name: "YTN (24시간 뉴스)", category: "News", type: "youtube_external", url: "https://www.youtube.com/@ytnnews24/live" },
            { name: "연합뉴스TV", category: "News", type: "youtube_external", url: "https://www.youtube.com/@yonhapnewstv23/live" },
            { name: "Arirang TV (Global)", category: "Culture", type: "hls", url: "https://amdlive-ch01-ctnd-com.akamaized.net/arirang_1ch/smil:arirang_1ch.smil/playlist.m3u8" }
        ],
        "Asia": [
            { name: "Al Jazeera (Main)", category: "News", type: "hls", url: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8" },
            { name: "CGTN (China)", category: "News", type: "hls", url: "https://live.cgtn.com/1000/prog_index.m3u8" },
            { name: "CNA (Singapore)", category: "News", type: "hls", url: "https://d2e1asnsl7br7b.cloudfront.net/7782e205e72f43aeb4a48ec97f66ebbe/index.m3u8" }
        ],
        "Europe": [
            { name: "DW English (Germany)", category: "News", type: "hls", url: "https://dwamdstream102.akamaized.net/hls/live/2015525/dwstream102/index.m3u8" },
            { name: "France 24 English", category: "News", type: "hls", url: "https://static.france24.com/live/F24_EN_HI_HLS/live_web.m3u8" },
            { name: "EuroNews (Europe)", category: "News", type: "hls", url: "https://ewns-hls-en-europe.akamaized.net/default/master.m3u8" }
        ]
    };

    const videoElement = document.getElementById('tv-player');
    const noSignalScreen = document.getElementById('no-signal');
    const launcherScreen = document.getElementById('launcher-screen');
    const launchBtn = document.getElementById('launch-btn');
    const ledStation = document.getElementById('led-station');
    const stationList = document.getElementById('station-list');
    const scanBtn = document.getElementById('scan-btn');
    const onAirIndicator = document.getElementById('on-air-indicator');
    
    let hls = null; 

    scanBtn.addEventListener('click', () => {
        const region = document.getElementById('region-select').value;
        if(!region) { alert("지역을 선택해 주십시오."); return; }

        const channels = tvDatabase[region];
        ledStation.innerText = `총 ${channels.length}개의 채널이 검색되었습니다.`;
        stationList.innerHTML = '';

        channels.forEach(channel => {
            const li = document.createElement('li');
            li.className = 'station-item';
            li.innerHTML = `
                <div class="st-name">${channel.name}</div>
                <div class="st-meta">${channel.category}</div>
            `;
            li.onclick = () => playChannel(channel);
            stationList.appendChild(li);
        });
    });

    function playChannel(channel) {
        ledStation.innerText = `▶ 선택됨: ${channel.name}`;
        onAirIndicator.classList.add('active'); 
        
        // 모든 패널 끄기 초기화
        noSignalScreen.style.display = 'none'; 
        videoElement.style.display = 'none';
        launcherScreen.style.display = 'none';
        
        if (hls) hls.destroy();
        videoElement.pause();

        // 💡 1. 유튜브 등 외부 연동 채널일 경우
        if (channel.type === "youtube_external") {
            launcherScreen.style.display = 'flex';
            launchBtn.href = channel.url;
            return;
        }

        // 💡 2. 자체 재생 가능한 글로벌 채널일 경우 (hls)
        videoElement.style.display = 'block';

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(channel.url);
            hls.attachMedia(videoElement);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                videoElement.play();
            });
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) handleError();
            });
        } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            videoElement.src = channel.url;
            videoElement.addEventListener('loadedmetadata', function() {
                videoElement.play();
            });
            videoElement.addEventListener('error', handleError);
        }
    }

    function handleError() {
        videoElement.style.display = 'none';
        noSignalScreen.style.display = 'flex';
        noSignalScreen.innerHTML = `<h2>송출 오류 📡</h2><p>해당 채널의 주소가 변경되었거나 차단되었습니다.<br>다른 채널을 선택해 보세요.</p>`;
        ledStation.innerText = "연결 실패 (Blocked)";
        onAirIndicator.classList.remove('active');
    }
</script>

</body>
</html>
